<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashura Sayaç</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..800&family=JetBrains+Mono:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Ashura sayacı">
      <header class="top">
        <div class="top__glow" aria-hidden="true"></div>
        <h1 class="top__title">Ashura gelene kadar siteyi acık tutuyorum GÜN</h1>
        <p class="top__sub" id="tzLine">Istanbul saati (Europe/Istanbul)</p>
      </header>

      <section class="card" aria-live="polite">
        <div class="date" id="dateLine">--.--.----</div>

        <div class="grid" role="group" aria-label="Gün saat dakika saniye">
          <div class="cell">
            <div class="cell__label">GÜN</div>
            <div class="cell__value" id="dayVal">--</div>
          </div>
          <div class="cell">
            <div class="cell__label">SAAT</div>
            <div class="cell__value" id="hourVal">--</div>
          </div>
          <div class="cell">
            <div class="cell__label">DAKİKA</div>
            <div class="cell__value" id="minuteVal">--</div>
          </div>
          <div class="cell">
            <div class="cell__label">SANİYE</div>
            <div class="cell__value" id="secondVal">--</div>
          </div>
        </div>

        <div class="hint">
          Bu sayaç geri sayım değil: Istanbul saatine göre gerçek zaman akıyor.
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
